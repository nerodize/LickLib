name: CI

on:
  push:
    branches: [ "**" ] # alle Branches
  pull_request:
    branches: [ "main" ] # nur PRs die in main landen

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GO_Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: GO_Backend/go.sum

      - name: Build
        run: go build -v ./...

      - name: Unit Tests
        run: go test -v ./... -short

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GO_Backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: GO_Backend/go.sum

      - name: Integration Tests
        run: go test -v ./...