name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GO_Backend  # ← alle steps laufen hier

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: GO_Backend/go.sum  # ← Cache-Pfad explizit

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./... -short  # -short überspringt Integration-Tests (kein DB)