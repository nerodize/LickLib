services:
  db:
    image: postgres:16
    container_name: licklib-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: licks
    ports:
      - "5432:5432"
    volumes:
      - ../../../migrations:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    networks:
      - licklib-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: licklib-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin_user
      MINIO_ROOT_PASSWORD: supersecretpassword123
    command: server /tracks --console-address ":9001"
    volumes:
      - minio_data:/tracks
    networks:
      - licklib-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: licklib-keycloak-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/licks
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    command: start-dev
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - licklib-dev
  
  prometheus:
    image: prom/prometheus:latest
    container_name: licklib-prometheus-dev
    volumes:
    - ../../../.extras/prometheus/:/etc/prometheus:ro
    ports:
    - "9090:9090"
    networks:
    - licklib-dev

  grafana:
    image: grafana/grafana:latest
    container_name: licklib-grafana-dev
    ports:
    - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
    - grafana_data:/var/lib/grafana
    networks:
    - licklib-dev

volumes:
  pgdata:
  minio_data:
  grafana_data:

networks:
  licklib-dev:
    driver: bridge