services: 
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: licks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio_s3_emulator_go
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web-Oberfläche
    environment:
      MINIO_ROOT_USER: minio_admin_user
      MINIO_ROOT_PASSWORD: supersecretpassword123
    command: server /tracks --console-address ":9001"
    volumes:
      - minio_data:/tracks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

# Alle Volumes müssen in einen einzigen Block am Ende
volumes:
  pgdata:
  minio_data: