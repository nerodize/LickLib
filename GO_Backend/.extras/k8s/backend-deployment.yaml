apiVersion: apps/v1
kind: Deployment
metadata:
  name: licklib-backend
  labels:
    app: licklib-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: licklib-backend
  template:
    metadata:
      labels:
        app: licklib-backend
    spec:
      containers:
        - name: licklib-backend
          image: licklib-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_MODE
              value: "dev"
            - name: DB_DSN
              value: "postgres://postgres:$(DB_PASSWORD)@postgres:5432/licks?sslmode=disable"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: licklib-config